let questionStates = {};
let currentFilter = 'all';

function init() {
  questions.forEach(q => { questionStates[q.num] = 'open'; });
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card_' + q.num;
    card.innerHTML = `
      <div class="q-number">Frage ${idx + 1}</div>
      <div class="q-text">${q.text}</div>
      ${q.multi ? '<div class="q-hint">ℹ Mehrfachauswahl: 2 richtige Antworten</div>' : ''}
      <div class="choices" id="choices_${q.num}"></div>
      <button class="check-btn" id="checkbtn_${q.num}" disabled>Auswerten</button>
      <div class="q-feedback" id="feedback_${q.num}"></div>
    `;
    container.appendChild(card);

    const choicesDiv = document.getElementById('choices_' + q.num);
    q.choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.id = 'choice_' + q.num + '_' + c.label;
      btn.dataset.label = c.label;
      btn.innerHTML = '<span class="label">' + c.label + '</span><span>' + c.text + '</span>';
      btn.addEventListener('click', () => toggleChoice(q.num, c.label, q.multi));
      choicesDiv.appendChild(btn);
    });

    document.getElementById('checkbtn_' + q.num).addEventListener('click', () => checkQuestion(q.num, q.correct));
  });
  updateScoreboard();
}

function toggleChoice(num, label, multi) {
  const btn = document.getElementById('choice_' + num + '_' + label);
  if (!btn || btn.disabled) return;
  if (!multi) {
    document.querySelectorAll('[id^="choice_' + num + '_"]').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  } else {
    btn.classList.toggle('selected');
    const sel = document.querySelectorAll('[id^="choice_' + num + '_"].selected');
    if (sel.length > 2) btn.classList.remove('selected');
  }
  const any = document.querySelectorAll('[id^="choice_' + num + '_"].selected').length > 0;
  document.getElementById('checkbtn_' + num).disabled = !any;
}

function checkQuestion(num, correct) {
  const allBtns = document.querySelectorAll('[id^="choice_' + num + '_"]');
  const selected = [...allBtns].filter(b => b.classList.contains('selected')).map(b => b.dataset.label);
  allBtns.forEach(b => b.disabled = true);
  document.getElementById('checkbtn_' + num).disabled = true;

  const correctSet = new Set(correct);
  const selectedSet = new Set(selected);
  allBtns.forEach(b => {
    const l = b.dataset.label;
    if (correctSet.has(l) && selectedSet.has(l)) b.classList.add('correct-answer');
    else if (!correctSet.has(l) && selectedSet.has(l)) b.classList.add('wrong-selected');
    else if (correctSet.has(l) && !selectedSet.has(l)) b.classList.add('missed');
  });

  const allCorrectSelected = [...correctSet].every(l => selectedSet.has(l));
  const noWrongSelected = [...selectedSet].every(l => correctSet.has(l));
  let status = 'wrong';
  if (allCorrectSelected && noWrongSelected) status = 'correct';
  else if (!allCorrectSelected && noWrongSelected && selected.length > 0) status = 'partial';

  questionStates[num] = status;
  const feedback = document.getElementById('feedback_' + num);
  const card = document.getElementById('card_' + num);
  card.classList.remove('answered-correct','answered-wrong','answered-partial');
  if (status === 'correct') {
    feedback.className = 'q-feedback show ok';
    feedback.textContent = '✓ Richtig! Korrekte Antwort: ' + correct.join(', ');
    card.classList.add('answered-correct');
  } else if (status === 'partial') {
    feedback.className = 'q-feedback show partial';
    feedback.textContent = '◑ Teilweise richtig. Korrekte Antwort: ' + correct.join(', ');
    card.classList.add('answered-partial');
  } else {
    feedback.className = 'q-feedback show fail';
    feedback.textContent = '✗ Falsch. Korrekte Antwort: ' + correct.join(', ');
    card.classList.add('answered-wrong');
  }
  updateScoreboard();
  applyFilter(currentFilter);
}

function checkAll() {
  document.querySelectorAll('.check-btn:not(:disabled)').forEach(b => b.click());
}

function resetAll() {
  document.getElementById('final-banner').classList.remove('show');
  currentFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.filter-btn')[0].classList.add('active');
  init();
}

function updateScoreboard() {
  const vals = Object.values(questionStates);
  const total = vals.length;
  const correct = vals.filter(v => v === 'correct').length;
  const wrong = vals.filter(v => v === 'wrong' || v === 'partial').length;
  const open = vals.filter(v => v === 'open').length;
  const answered = correct + wrong;
  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent = wrong;
  document.getElementById('sc-open').textContent = open;
  document.getElementById('sc-pct').textContent = answered > 0 ? Math.round(correct / answered * 100) + '%' : '–';
  document.getElementById('progress-fill').style.width = (total > 0 ? answered / total * 100 : 0) + '%';
  if (open === 0 && total > 0) {
    const pct = Math.round(correct / total * 100);
    const grade = pct >= 92 ? '1' : pct >= 81 ? '2' : pct >= 67 ? '3' : pct >= 50 ? '4' : pct >= 30 ? '5' : '6';
    document.getElementById('final-grade').textContent = pct + '% · Note ' + grade;
    document.getElementById('final-sub').textContent = correct + ' von ' + total + ' Fragen richtig';
    document.getElementById('final-banner').classList.add('show');
    window.scrollTo({top: 0, behavior: 'smooth'});
  }
}

function setFilter(filter, btnEl) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  applyFilter(filter);
}

function applyFilter(filter) {
  document.querySelectorAll('.question-card').forEach(card => {
    const num = parseInt(card.id.replace('card_',''));
    const state = questionStates[num] || 'open';
    if (filter === 'all') card.style.display = '';
    else if (filter === 'open') card.style.display = state === 'open' ? '' : 'none';
    else if (filter === 'correct') card.style.display = state === 'correct' ? '' : 'none';
    else if (filter === 'wrong') card.style.display = (state === 'wrong' || state === 'partial') ? '' : 'none';
  });
}

function showOnlyWrong() {
  const btn = [...document.querySelectorAll('.filter-btn')].find(b => b.textContent === 'Falsch');
  if (btn) setFilter('wrong', btn);
}

function showAll() {
  setFilter('all', document.querySelectorAll('.filter-btn')[0]);
}

init();
</script>
