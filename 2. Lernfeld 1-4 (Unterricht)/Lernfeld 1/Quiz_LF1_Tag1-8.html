<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lernfeld 1 Quiz - Tag 1 bis 8</title>
<style>
:root {
  --red: #C0392B;
  --dark: #1A1A2E;
  --blue: #3498DB;
  --orange: #F39C12;
  --green: #27AE60;
  --gray: #ECF0F1;
  --white: #FFFFFF;
  --shadow: 0 4px 15px rgba(0,0,0,0.1);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.15);
  --radius: 12px;
  --transition: all 0.3s ease;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: var(--gray);
  color: var(--dark);
  min-height: 100vh;
  line-height: 1.6;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

/* Landing Page */
.landing-page {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  text-align: center;
  padding: 40px 20px;
}

.landing-card {
  background: var(--white);
  border-radius: 20px;
  padding: 60px 40px;
  box-shadow: var(--shadow-lg);
  max-width: 700px;
  width: 100%;
}

.landing-icon {
  font-size: 64px;
  margin-bottom: 20px;
}

.landing-card h1 {
  font-size: 2.4em;
  color: var(--dark);
  margin-bottom: 10px;
  font-weight: 800;
}

.landing-card h1 span {
  color: var(--blue);
}

.landing-card .subtitle {
  font-size: 1.2em;
  color: #666;
  margin-bottom: 40px;
}

.tag-overview {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 40px;
  text-align: left;
}

.tag-overview-item {
  background: var(--gray);
  padding: 14px 18px;
  border-radius: 10px;
  font-size: 0.95em;
  border-left: 4px solid var(--blue);
  transition: var(--transition);
}

.tag-overview-item:hover {
  transform: translateX(4px);
  border-left-color: var(--orange);
}

.tag-overview-item strong {
  color: var(--dark);
}

.btn-start {
  background: linear-gradient(135deg, var(--blue), #2980B9);
  color: var(--white);
  border: none;
  padding: 18px 60px;
  font-size: 1.3em;
  font-weight: 700;
  border-radius: 50px;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
  letter-spacing: 0.5px;
}

.btn-start:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 25px rgba(52, 152, 219, 0.5);
}

/* Quiz Page */
.quiz-page {
  display: none;
  padding: 20px 0;
}

.quiz-header {
  background: var(--dark);
  color: var(--white);
  border-radius: var(--radius);
  padding: 24px 30px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
}

.quiz-header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 16px;
}

.tag-title {
  font-size: 1.4em;
  font-weight: 700;
}

.tag-badge {
  background: var(--blue);
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 0.9em;
  font-weight: 600;
}

.score-display {
  display: flex;
  gap: 20px;
  font-size: 0.95em;
}

.score-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.score-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
}

.score-dot.correct { background: var(--green); }
.score-dot.wrong { background: var(--red); }

/* Progress Bar */
.progress-container {
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  height: 8px;
  overflow: hidden;
  margin-top: 12px;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--blue));
  border-radius: 10px;
  transition: width 0.5s ease;
  width: 0%;
}

.progress-text {
  text-align: right;
  font-size: 0.8em;
  margin-top: 4px;
  opacity: 0.8;
}

/* Question Card */
.question-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 30px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  transition: var(--transition);
}

.question-number {
  display: inline-block;
  background: var(--blue);
  color: var(--white);
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 0.85em;
  font-weight: 600;
  margin-bottom: 14px;
}

.question-text {
  font-size: 1.15em;
  font-weight: 600;
  margin-bottom: 20px;
  color: var(--dark);
  line-height: 1.5;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--gray);
  border: 2px solid transparent;
  border-radius: 10px;
  padding: 14px 18px;
  cursor: pointer;
  transition: var(--transition);
  text-align: left;
  font-size: 1em;
  color: var(--dark);
  width: 100%;
}

.option-btn:hover:not(.disabled) {
  border-color: var(--blue);
  background: #EBF5FB;
  transform: translateX(4px);
}

.option-label {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--white);
  font-weight: 700;
  color: var(--dark);
  flex-shrink: 0;
  border: 2px solid #ddd;
  transition: var(--transition);
}

.option-text {
  flex: 1;
}

.option-btn.correct-answer {
  background: #D5F5E3;
  border-color: var(--green);
}

.option-btn.correct-answer .option-label {
  background: var(--green);
  color: var(--white);
  border-color: var(--green);
}

.option-btn.wrong-answer {
  background: #FADBD8;
  border-color: var(--red);
}

.option-btn.wrong-answer .option-label {
  background: var(--red);
  color: var(--white);
  border-color: var(--red);
}

.option-btn.disabled {
  cursor: default;
  opacity: 0.7;
}

.option-btn.correct-answer.disabled {
  opacity: 1;
}

.feedback-msg {
  margin-top: 14px;
  padding: 12px 18px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 0.95em;
  display: none;
}

.feedback-msg.correct {
  background: #D5F5E3;
  color: #1E8449;
  display: block;
}

.feedback-msg.wrong {
  background: #FADBD8;
  color: #C0392B;
  display: block;
}

/* Navigation */
.nav-buttons {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-top: 20px;
  flex-wrap: wrap;
}

.btn-nav {
  padding: 14px 32px;
  border: none;
  border-radius: 10px;
  font-size: 1em;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-nav:hover {
  transform: translateY(-2px);
}

.btn-prev {
  background: var(--white);
  color: var(--dark);
  border: 2px solid #ddd;
}

.btn-prev:hover {
  border-color: var(--blue);
  color: var(--blue);
}

.btn-next {
  background: linear-gradient(135deg, var(--blue), #2980B9);
  color: var(--white);
  box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
}

.btn-next:hover {
  box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
}

.btn-finish {
  background: linear-gradient(135deg, var(--green), #229954);
  color: var(--white);
  box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3);
}

.btn-finish:hover {
  box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
}

/* Tag Navigation Dots */
.tag-nav-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.tag-dot {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid #ddd;
  background: var(--white);
  cursor: pointer;
  font-weight: 700;
  font-size: 0.85em;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  color: var(--dark);
}

.tag-dot.active {
  background: var(--blue);
  color: var(--white);
  border-color: var(--blue);
  transform: scale(1.1);
}

.tag-dot.completed {
  background: var(--green);
  color: var(--white);
  border-color: var(--green);
}

.tag-dot:hover {
  transform: scale(1.1);
  border-color: var(--blue);
}

/* Summary Page */
.summary-page {
  display: none;
  padding: 20px 0;
}

.summary-card {
  background: var(--white);
  border-radius: 20px;
  padding: 40px;
  box-shadow: var(--shadow-lg);
  text-align: center;
}

.summary-card h2 {
  font-size: 2em;
  color: var(--dark);
  margin-bottom: 8px;
}

.summary-subtitle {
  color: #666;
  margin-bottom: 30px;
  font-size: 1.1em;
}

.total-score {
  font-size: 3.5em;
  font-weight: 800;
  margin: 20px 0;
  line-height: 1;
}

.total-score .fraction {
  font-size: 0.4em;
  color: #999;
  font-weight: 400;
}

.total-percentage {
  font-size: 1.4em;
  font-weight: 600;
  margin-bottom: 10px;
}

.grade-emoji {
  font-size: 3em;
  margin-bottom: 20px;
}

.grade-text {
  font-size: 1.1em;
  color: #666;
  margin-bottom: 30px;
}

.tag-results {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 14px;
  margin: 30px 0;
  text-align: left;
}

.tag-result-item {
  background: var(--gray);
  border-radius: 12px;
  padding: 18px;
  transition: var(--transition);
}

.tag-result-item:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.tag-result-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.tag-result-name {
  font-weight: 700;
  font-size: 0.95em;
  color: var(--dark);
}

.tag-result-score {
  font-weight: 700;
  font-size: 0.95em;
}

.tag-result-bar {
  background: #ddd;
  border-radius: 6px;
  height: 8px;
  overflow: hidden;
}

.tag-result-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 1s ease;
}

.btn-restart {
  background: linear-gradient(135deg, var(--orange), #E67E22);
  color: var(--white);
  border: none;
  padding: 16px 50px;
  font-size: 1.15em;
  font-weight: 700;
  border-radius: 50px;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4);
  margin-top: 20px;
}

.btn-restart:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 25px rgba(243, 156, 18, 0.5);
}

/* Footer */
.footer {
  text-align: center;
  padding: 30px 20px;
  color: #999;
  font-size: 0.9em;
}

.footer strong {
  color: #666;
}

/* Overall Progress */
.overall-progress {
  background: var(--white);
  border-radius: var(--radius);
  padding: 16px 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.overall-label {
  font-weight: 600;
  font-size: 0.9em;
  color: #666;
  white-space: nowrap;
}

.overall-bar-container {
  flex: 1;
  min-width: 150px;
}

.overall-bar-bg {
  background: var(--gray);
  border-radius: 8px;
  height: 10px;
  overflow: hidden;
}

.overall-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--orange), var(--red));
  border-radius: 8px;
  transition: width 0.5s ease;
  width: 0%;
}

.overall-score-text {
  font-weight: 700;
  font-size: 0.95em;
  color: var(--dark);
  white-space: nowrap;
}

/* Question indicators */
.question-indicators {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 20px;
}

.q-indicator {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: 2px solid #ddd;
  background: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75em;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}

.q-indicator.active {
  border-color: var(--blue);
  background: #EBF5FB;
  color: var(--blue);
}

.q-indicator.answered-correct {
  background: var(--green);
  color: var(--white);
  border-color: var(--green);
}

.q-indicator.answered-wrong {
  background: var(--red);
  color: var(--white);
  border-color: var(--red);
}

.q-indicator:hover {
  transform: scale(1.15);
}

/* Responsive */
@media (max-width: 600px) {
  .landing-card {
    padding: 40px 24px;
  }
  .landing-card h1 {
    font-size: 1.7em;
  }
  .landing-card .subtitle {
    font-size: 1em;
  }
  .tag-overview {
    grid-template-columns: 1fr;
  }
  .quiz-header {
    padding: 18px 20px;
  }
  .tag-title {
    font-size: 1.1em;
  }
  .question-card {
    padding: 20px;
  }
  .question-text {
    font-size: 1.05em;
  }
  .option-btn {
    padding: 12px 14px;
    font-size: 0.95em;
  }
  .option-label {
    width: 30px;
    height: 30px;
    font-size: 0.85em;
  }
  .btn-nav {
    padding: 12px 24px;
    font-size: 0.9em;
  }
  .summary-card {
    padding: 30px 20px;
  }
  .total-score {
    font-size: 2.5em;
  }
  .tag-results {
    grid-template-columns: 1fr;
  }
  .container {
    padding: 12px;
  }
  .nav-buttons {
    flex-direction: column;
  }
  .btn-nav {
    justify-content: center;
  }
  .q-indicator {
    width: 28px;
    height: 28px;
    font-size: 0.7em;
  }
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

.fade-in {
  animation: fadeIn 0.4s ease forwards;
}

.scale-in {
  animation: scaleIn 0.3s ease forwards;
}

/* Scrollbar */
::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-track {
  background: var(--gray);
}

::-webkit-scrollbar-thumb {
  background: #bbb;
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: #999;
}
</style>
</head>
<body>

<!-- Landing Page -->
<div id="landingPage" class="landing-page">
  <div class="landing-card fade-in">
    <div class="landing-icon">&#128218;</div>
    <h1>Lernfeld 1 Quiz <span>Tag 1 bis 8</span></h1>
    <p class="subtitle">160 Multiple-Choice-Fragen zum Selbsttest</p>
    <div class="tag-overview" id="tagOverview"></div>
    <button class="btn-start" onclick="startQuiz()">Quiz starten &#10148;</button>
  </div>
  <div class="footer">&copy; Can Siebert &amp; Hamzah Meyer</div>
</div>

<!-- Quiz Page -->
<div id="quizPage" class="quiz-page container">
  <div class="tag-nav-dots" id="tagNavDots"></div>
  <div class="overall-progress">
    <span class="overall-label">Gesamtfortschritt:</span>
    <div class="overall-bar-container">
      <div class="overall-bar-bg">
        <div class="overall-bar-fill" id="overallBar"></div>
      </div>
    </div>
    <span class="overall-score-text" id="overallScoreText">0 / 160</span>
  </div>
  <div class="quiz-header" id="quizHeader">
    <div class="quiz-header-top">
      <div class="tag-title" id="tagTitle"></div>
      <div class="tag-badge" id="tagBadge"></div>
    </div>
    <div class="score-display">
      <div class="score-item"><span class="score-dot correct"></span><span id="correctCount">0</span> Richtig</div>
      <div class="score-item"><span class="score-dot wrong"></span><span id="wrongCount">0</span> Falsch</div>
    </div>
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-text" id="progressText">0 / 20 beantwortet</div>
  </div>
  <div class="question-indicators" id="questionIndicators"></div>
  <div id="questionContainer"></div>
  <div class="nav-buttons" id="navButtons"></div>
  <div class="footer">&copy; Can Siebert &amp; Hamzah Meyer</div>
</div>

<!-- Summary Page -->
<div id="summaryPage" class="summary-page container">
  <div class="summary-card fade-in" id="summaryContent"></div>
  <div class="footer">&copy; Can Siebert &amp; Hamzah Meyer</div>
</div>

<script>
const quizData = [
  {
    tag: 1,
    title: "Das Modellunternehmen",
    questions: [
      { q: "In welchem Jahr wurde die Exclusiva GmbH urspr\u00fcnglich als Einzelunternehmen gegr\u00fcndet?", options: ["1978", "1969", "1985", "2001"], correct: 1 },
      { q: "Wie hoch ist das Mindeststammkapital einer GmbH?", options: ["50.000 EUR", "10.000 EUR", "25.000 EUR", "100.000 EUR"], correct: 2 },
      { q: "Was bedeutet die Abk\u00fcrzung B2C?", options: ["Business to Company", "Business to Consumer", "Brand to Customer", "Buying to Consumer"], correct: 1 },
      { q: "Welche Haftung haben die Gesellschafter einer GmbH?", options: ["Sie haften unbeschr\u00e4nkt mit ihrem Privatverm\u00f6gen", "Sie haften nur mit ihrer Einlage", "Sie haften gar nicht", "Sie haften nur bei Vorsatz"], correct: 1 },
      { q: "Was ist ein Warenwirtschaftssystem (WWS)?", options: ["Eine Buchhaltungssoftware", "Ein System zur reinen Lagerverwaltung", "Eine Software zur Verwaltung aller warenbezogenen Daten und Prozesse", "Ein Programm f\u00fcr das Online-Marketing"], correct: 2 },
      { q: "Welche Art der Handlungsvollmacht ist die engste?", options: ["Allgemeine Handlungsvollmacht", "Artvollmacht", "Einzelvollmacht", "Prokura"], correct: 2 },
      { q: "Welcher Funktionsbereich ist NICHT im Organigramm der Exclusiva GmbH?", options: ["Einkauf", "Onlinevertrieb", "Forschung & Entwicklung", "Rechnungswesen"], correct: 2 },
      { q: "Wof\u00fcr steht B2B?", options: ["Business to Bank", "Business to Business", "Brand to Brand", "Buyer to Buyer"], correct: 1 },
      { q: "Seit wann ist der Beruf Kaufmann/Kauffrau im E-Commerce ein eigenst\u00e4ndiger Ausbildungsberuf?", options: ["2015", "2020", "2018", "2010"], correct: 2 },
      { q: "Welche Aufgabe geh\u00f6rt NICHT zu den betrieblichen Grundfunktionen?", options: ["Beschaffung", "Lager", "Personalentwicklung", "Rechnungswesen"], correct: 2 },
      { q: "Was war das urspr\u00fcngliche Sortiment der Exclusiva GmbH?", options: ["Elektronik", "Luxus-Schreibwaren", "Sportartikel", "Lebensmittel"], correct: 1 },
      { q: "Wo hat die Exclusiva GmbH ihren Sitz?", options: ["Hamburg", "Berlin", "Hildesheim", "M\u00fcnchen"], correct: 2 },
      { q: "Was ist eine GmbH rechtlich gesehen?", options: ["Eine Personengesellschaft", "Eine juristische Person", "Eine Einzelfirma", "Ein Verein"], correct: 1 },
      { q: "Welches Gesch\u00e4ft ist von der Handlungsvollmacht grunds\u00e4tzlich ausgeschlossen?", options: ["Einkauf von Waren", "Aufnahme von Darlehen", "Verkauf an Kunden", "Bestellung von B\u00fcromaterial"], correct: 1 },
      { q: "In welchem Gesetz sind Handlungsvollmachten geregelt?", options: ["BGB", "HGB", "StGB", "UWG"], correct: 1 },
      { q: "Welches Organ geh\u00f6rt zur GmbH?", options: ["Vorstand", "Hauptversammlung", "Gesellschafterversammlung", "Betriebsversammlung"], correct: 2 },
      { q: "Wie viele Mitarbeiter hat die Exclusiva GmbH ca.?", options: ["50", "150", "300", "1.000"], correct: 2 },
      { q: "Wann wurde die Exclusiva GmbH in eine GmbH umgewandelt?", options: ["1969", "1978", "1985", "2001"], correct: 2 },
      { q: "Ab wie vielen wahlberechtigten Arbeitnehmern kann ein Betriebsrat gebildet werden?", options: ["3", "5", "10", "20"], correct: 1 },
      { q: "Was umfasst ein Unternehmensleitbild?", options: ["Nur den Jahresabschluss", "Mission, Vision und Werte", "Nur die Umsatzzahlen", "Die Steuererkl\u00e4rung"], correct: 1 }
    ]
  },
  {
    tag: 2,
    title: "Orientierung & Aktives Lesen",
    questions: [
      { q: "Im Einliniensystem hat jeder Mitarbeiter...", options: ["mehrere Vorgesetzte", "genau einen Vorgesetzten", "keinen Vorgesetzten", "einen Berater"], correct: 1 },

// State
let currentTag = 0;
let currentQuestion = 0;
let answers = []; // answers[tag][question] = { selected: index, correct: boolean } or null
let tagScores = []; // tagScores[tag] = { correct: n, wrong: n }

function initState() {
  answers = [];
  tagScores = [];
  for (let t = 0; t < quizData.length; t++) {
    answers.push(new Array(quizData[t].questions.length).fill(null));
    tagScores.push({ correct: 0, wrong: 0 });
  }
  currentTag = 0;
  currentQuestion = 0;
}

function startQuiz() {
  initState();
  document.getElementById('landingPage').style.display = 'none';
  document.getElementById('quizPage').style.display = 'block';
  document.getElementById('summaryPage').style.display = 'none';
  renderQuiz();
}

function renderQuiz() {
  renderTagDots();
  renderHeader();
  renderQuestionIndicators();
  renderQuestion();
  renderNavButtons();
  updateOverallProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderTagDots() {
  const container = document.getElementById('tagNavDots');
  container.innerHTML = '';
  for (let t = 0; t < quizData.length; t++) {
    const dot = document.createElement('div');
    dot.className = 'tag-dot';
    if (t === currentTag) dot.classList.add('active');
    const allAnswered = answers[t].every(a => a !== null);
    if (allAnswered) dot.classList.add('completed');
    dot.textContent = t + 1;
    dot.title = 'Tag ' + (t + 1) + ': ' + quizData[t].title;
    dot.onclick = () => { currentTag = t; currentQuestion = 0; renderQuiz(); };
    container.appendChild(dot);
  }
}

function renderHeader() {
  const tag = quizData[currentTag];
  document.getElementById('tagTitle').textContent = 'Tag ' + tag.tag + ': ' + tag.title;
  document.getElementById('tagBadge').textContent = 'Tag ' + tag.tag + ' / 8';
  document.getElementById('correctCount').textContent = tagScores[currentTag].correct;
  document.getElementById('wrongCount').textContent = tagScores[currentTag].wrong;

  const answered = answers[currentTag].filter(a => a !== null).length;
  const total = tag.questions.length;
  const pct = total > 0 ? (answered / total * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = answered + ' / ' + total + ' beantwortet';
}

function renderQuestionIndicators() {
  const container = document.getElementById('questionIndicators');
  container.innerHTML = '';
  const tag = quizData[currentTag];
  for (let i = 0; i < tag.questions.length; i++) {
    const ind = document.createElement('div');
    ind.className = 'q-indicator';
    if (i === currentQuestion) ind.classList.add('active');
    if (answers[currentTag][i] !== null) {
      ind.classList.add(answers[currentTag][i].correct ? 'answered-correct' : 'answered-wrong');
    }
    ind.textContent = i + 1;
    ind.onclick = () => { currentQuestion = i; renderQuiz(); };
    container.appendChild(ind);
  }
}

function renderQuestion() {
  const container = document.getElementById('questionContainer');
  const tag = quizData[currentTag];
  const q = tag.questions[currentQuestion];
  const ans = answers[currentTag][currentQuestion];
  const labels = ['A', 'B', 'C', 'D'];

  let html = '<div class="question-card fade-in">';
  html += '<div class="question-number">Frage ' + (currentQuestion + 1) + ' von ' + tag.questions.length + '</div>';
  html += '<div class="question-text">' + escapeHtml(q.q) + '</div>';
  html += '<div class="options">';

  for (let i = 0; i < q.options.length; i++) {
    let cls = 'option-btn';
    if (ans !== null) {
      cls += ' disabled';
      if (i === q.correct) cls += ' correct-answer';
      if (i === ans.selected && !ans.correct) cls += ' wrong-answer';
    }
    html += '<button class="' + cls + '" ' + (ans !== null ? 'disabled' : '') + ' onclick="selectAnswer(' + currentTag + ',' + currentQuestion + ',' + i + ')">';
    html += '<span class="option-label">' + labels[i] + '</span>';
    html += '<span class="option-text">' + escapeHtml(q.options[i]) + '</span>';
    html += '</button>';
  }

  html += '</div>';

  if (ans !== null) {
    if (ans.correct) {
      html += '<div class="feedback-msg correct">&#10004; Richtig! Sehr gut.</div>';
    } else {
      html += '<div class="feedback-msg wrong">&#10008; Falsch. Die richtige Antwort ist ' + labels[q.correct] + ': ' + escapeHtml(q.options[q.correct]) + '</div>';
    }
  }

  html += '</div>';
  container.innerHTML = html;
}

function selectAnswer(tagIdx, qIdx, optIdx) {
  if (answers[tagIdx][qIdx] !== null) return;
  const q = quizData[tagIdx].questions[qIdx];
  const isCorrect = optIdx === q.correct;
  answers[tagIdx][qIdx] = { selected: optIdx, correct: isCorrect };
  if (isCorrect) {
    tagScores[tagIdx].correct++;
  } else {
    tagScores[tagIdx].wrong++;
  }
  renderHeader();
  renderQuestionIndicators();
  renderQuestion();
  renderNavButtons();
  updateOverallProgress();
}

function renderNavButtons() {
  const container = document.getElementById('navButtons');
  const tag = quizData[currentTag];
  const isFirstQ = currentQuestion === 0 && currentTag === 0;
  const isLastQ = currentQuestion === tag.questions.length - 1;
  const isLastTag = currentTag === quizData.length - 1;
  const allDone = answers.every(tagAns => tagAns.every(a => a !== null));

  let html = '';

  // Prev button
  if (!isFirstQ || currentTag > 0) {
    html += '<button class="btn-nav btn-prev" onclick="prevQuestion()">&#9664; Zur\u00fcck</button>';
  } else {
    html += '<div></div>';
  }

  // Next / Finish
  if (isLastQ && isLastTag && allDone) {
    html += '<button class="btn-nav btn-finish" onclick="showSummary()">Ergebnis anzeigen &#9654;</button>';
  } else if (isLastQ && !isLastTag) {
    html += '<button class="btn-nav btn-next" onclick="nextTag()">N\u00e4chster Tag &#9654;</button>';
  } else if (isLastQ && isLastTag && !allDone) {
    html += '<button class="btn-nav btn-next" disabled style="opacity:0.5;cursor:default;">Alle Fragen beantworten</button>';
  } else {
    html += '<button class="btn-nav btn-next" onclick="nextQuestion()">N\u00e4chste Frage &#9654;</button>';
  }

  container.innerHTML = html;
}

function nextQuestion() {
  const tag = quizData[currentTag];
  if (currentQuestion < tag.questions.length - 1) {
    currentQuestion++;
    renderQuiz();
  }
}

function prevQuestion() {
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuiz();
  } else if (currentTag > 0) {
    currentTag--;
    currentQuestion = quizData[currentTag].questions.length - 1;
    renderQuiz();
  }
}

function nextTag() {
  if (currentTag < quizData.length - 1) {
    currentTag++;
    currentQuestion = 0;
    renderQuiz();
  }
}

function updateOverallProgress() {
  let totalAnswered = 0;
  let totalCorrect = 0;
  const totalQuestions = 160;
  for (let t = 0; t < quizData.length; t++) {
    totalAnswered += answers[t].filter(a => a !== null).length;
    totalCorrect += tagScores[t].correct;
  }
  const pct = totalQuestions > 0 ? (totalAnswered / totalQuestions * 100) : 0;
  document.getElementById('overallBar').style.width = pct + '%';
  document.getElementById('overallScoreText').textContent = totalCorrect + ' / ' + totalAnswered + ' richtig';
}

function showSummary() {
  document.getElementById('quizPage').style.display = 'none';
  document.getElementById('summaryPage').style.display = 'block';

  let totalCorrect = 0;
  let totalQuestions = 0;
  for (let t = 0; t < quizData.length; t++) {
    totalCorrect += tagScores[t].correct;
    totalQuestions += quizData[t].questions.length;
  }
  const pct = Math.round(totalCorrect / totalQuestions * 100);

  let gradeIcon = '';
  let gradeText = '';
  let gradeColor = '';
  if (pct >= 90) { gradeIcon = '&#127942;'; gradeText = 'Hervorragend! Du bist bestens vorbereitet!'; gradeColor = 'var(--green)'; }
  else if (pct >= 75) { gradeIcon = '&#11088;'; gradeText = 'Sehr gut! Nur noch Kleinigkeiten zum Perfektionieren.'; gradeColor = 'var(--blue)'; }
  else if (pct >= 60) { gradeIcon = '&#128170;'; gradeText = 'Gut! Einige Themen solltest du noch wiederholen.'; gradeColor = 'var(--orange)'; }
  else if (pct >= 40) { gradeIcon = '&#128214;'; gradeText = 'Ausreichend. Es gibt noch einiges zu lernen.'; gradeColor = 'var(--orange)'; }
  else { gradeIcon = '&#128218;'; gradeText = 'Hier ist noch viel Luft nach oben. Wiederhole die Inhalte!'; gradeColor = 'var(--red)'; }

  let html = '<h2>Quiz abgeschlossen!</h2>';
  html += '<p class="summary-subtitle">Dein Ergebnis f\u00fcr Lernfeld 1 - Tag 1 bis 8</p>';
  html += '<div class="grade-emoji">' + gradeIcon + '</div>';
  html += '<div class="total-score" style="color:' + gradeColor + '">' + totalCorrect + ' <span class="fraction">/ ' + totalQuestions + '</span></div>';
  html += '<div class="total-percentage" style="color:' + gradeColor + '">' + pct + '%</div>';
  html += '<p class="grade-text">' + gradeText + '</p>';

  html += '<div class="tag-results">';
  for (let t = 0; t < quizData.length; t++) {
    const tag = quizData[t];
    const c = tagScores[t].correct;
    const total = tag.questions.length;
    const tagPct = Math.round(c / total * 100);
    let barColor = 'var(--green)';
    if (tagPct < 40) barColor = 'var(--red)';
    else if (tagPct < 70) barColor = 'var(--orange)';
    else if (tagPct < 85) barColor = 'var(--blue)';

    html += '<div class="tag-result-item">';
    html += '<div class="tag-result-header">';
    html += '<span class="tag-result-name">Tag ' + tag.tag + '</span>';
    html += '<span class="tag-result-score" style="color:' + barColor + '">' + c + '/' + total + ' (' + tagPct + '%)</span>';
    html += '</div>';
    html += '<div class="tag-result-bar"><div class="tag-result-fill" style="width:' + tagPct + '%;background:' + barColor + '"></div></div>';
    html += '<div style="font-size:0.8em;color:#888;margin-top:6px;">' + escapeHtml(tag.title) + '</div>';
    html += '</div>';
  }
  html += '</div>';

  html += '<button class="btn-restart" onclick="restartQuiz()">&#128260; Quiz wiederholen</button>';

  document.getElementById('summaryContent').innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartQuiz() {
  document.getElementById('summaryPage').style.display = 'none';
  document.getElementById('landingPage').style.display = 'flex';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(text));
  return div.innerHTML;
}

// Initialize landing page tag overview
function initLanding() {
  const container = document.getElementById('tagOverview');
  const tagTitles = [
    'Das Modellunternehmen',
    'Orientierung & Aktives Lesen',
    'Handlungskompetenz & Feedback',
    'Soziale Kompetenz & E-Commerce-Arten',
    'Vertriebskan\u00e4le',
    'Einrichtung eines Webshops',
    'Webshop Name & Adresse',
    'SEO & Online-Marketing'
  ];
  for (let i = 0; i < tagTitles.length; i++) {
    const item = document.createElement('div');
    item.className = 'tag-overview-item';
    item.innerHTML = '<strong>Tag ' + (i + 1) + ':</strong> ' + tagTitles[i] + ' <span style="color:#999;">(20 Fragen)</span>';
    container.appendChild(item);
  }
}

initLanding();
</script>
