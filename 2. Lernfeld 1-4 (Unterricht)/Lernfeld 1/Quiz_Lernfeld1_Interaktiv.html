<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lernfeld 1 – Interaktives Quiz</title>
<style>
  :root {
    --red: #b41e1e;
    --blue: #1e3c78;
    --dark: #1a1a2e;
    --green: #2d8a4e;
    --orange: #d97706;
    --bg: #f4f4f8;
    --card: #ffffff;
    --border: #dde0e8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
  }
  header {
    background: var(--dark);
    color: white;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header h1 { font-size: 1.25rem; }
  header span { color: #aaa; font-size: 0.9rem; }

  .nav-bar {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .tag-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: white;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .tag-btn:hover { background: var(--bg); }
  .tag-btn.active { background: var(--red); color: white; border-color: var(--red); }

  .main {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  .quiz-header {
    background: var(--card);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .quiz-title { font-size: 1.1rem; font-weight: 700; color: var(--red); }
  .quiz-meta { font-size: 0.85rem; color: #666; }

  .score-box {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .score-item {
    text-align: center;
    min-width: 70px;
  }
  .score-item .val {
    font-size: 1.6rem;
    font-weight: 700;
  }
  .score-item .lbl {
    font-size: 0.75rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .val.correct { color: var(--green); }
  .val.wrong { color: var(--red); }
  .val.open { color: var(--blue); }

  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--red);
    border-radius: 3px;
    transition: width 0.3s;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 8px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 500;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--red); color: white; }
  .btn-secondary { background: var(--blue); color: white; }
  .btn-outline { background: white; color: var(--dark); border: 1px solid var(--border); }
  .btn-green { background: var(--green); color: white; }

  .question-card {
    background: var(--card);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }
  .question-card.answered-correct { border-left: 4px solid var(--green); }
  .question-card.answered-wrong { border-left: 4px solid var(--red); }
  .question-card.answered-partial { border-left: 4px solid var(--orange); }

  .q-number {
    font-size: 0.75rem;
    font-weight: 700;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .q-text {
    font-size: 1rem;
    line-height: 1.5;
    margin-bottom: 14px;
    font-weight: 500;
  }
  .q-hint {
    font-size: 0.78rem;
    color: var(--orange);
    margin-bottom: 10px;
    font-style: italic;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .choice-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    background: var(--bg);
    transition: all 0.15s;
    text-align: left;
    font-size: 0.92rem;
    line-height: 1.4;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--blue); background: #eef1f9; }
  .choice-btn .label {
    font-weight: 700;
    min-width: 22px;
    color: var(--blue);
    flex-shrink: 0;
  }
  .choice-btn.selected { border-color: var(--blue); background: #dde8f8; }
  .choice-btn.correct-answer { border-color: var(--green); background: #d4f0df; }
  .choice-btn.wrong-selected { border-color: var(--red); background: #fde8e8; }
  .choice-btn.missed { border-color: var(--orange); background: #fef3e2; }
  .choice-btn:disabled { cursor: default; }

  .q-feedback {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.88rem;
    display: none;
  }
  .q-feedback.show { display: block; }
  .q-feedback.ok { background: #d4f0df; color: #1a5c30; }
  .q-feedback.partial { background: #fef3e2; color: #8a5c00; }
  .q-feedback.fail { background: #fde8e8; color: #8a0000; }

  .check-btn {
    margin-top: 12px;
    padding: 7px 16px;
    background: var(--blue);
    color: white;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    font-size: 0.88rem;
  }
  .check-btn:hover { opacity: 0.85; }
  .check-btn:disabled { opacity: 0.4; cursor: default; }

  #no-tag {
    text-align: center;
    padding: 60px 20px;
    color: #888;
    font-size: 1.1rem;
  }

  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: white;
    cursor: pointer;
    font-size: 0.8rem;
  }
  .filter-btn.active { background: var(--dark); color: white; border-color: var(--dark); }

  .final-banner {
    background: linear-gradient(135deg, var(--dark), var(--blue));
    color: white;
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    margin-bottom: 20px;
    display: none;
  }
  .final-banner.show { display: block; }
  .final-banner .grade { font-size: 3rem; font-weight: 900; margin: 8px 0; }
  .final-banner .sub { color: #ccc; font-size: 0.9rem; }
</style>
</head>
<body>

<header>
  <div>
    <h1>&#127891; Lernfeld 1 – Interaktives Quiz</h1>
    <span>Kaufmann im E-Commerce &middot; Can Siebert &amp; Hamzah Meyer</span>
  </div>
</header>

<div class="nav-bar">
  <strong style="font-size:0.85rem;color:#666;margin-right:4px;">Tag:</strong>
  <button class="tag-btn" onclick="loadTag(1)">Tag 1</button>
<button class="tag-btn" onclick="loadTag(2)">Tag 2</button>
<button class="tag-btn" onclick="loadTag(3)">Tag 3</button>

</div>

<div class="main">
  <div id="no-tag">
    &#8592; Wähle einen Tag aus, um das Quiz zu starten.
  </div>

  <div id="quiz-area" style="display:none">

      <div>

        <div class="quiz-meta" id="quiz-meta"></div>
      </div>
      <div class="score-box">

        <div class="score-item"><div class="val wrong" id="sc-wrong">0</div><div class="lbl">Falsch</div></div>
        <div class="score-item"><div class="val open" id="sc-open">0</div><div class="lbl">Offen</div></div>
        <div class="score-item"><div class="val" id="sc-pct" style="color:var(--dark)">–</div><div class="lbl">Punkte</div></div>
      </div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

    <div class="final-banner" id="final-banner">
      <div>Quiz abgeschlossen!</div>
      <div class="grade" id="final-grade"></div>
      <div class="sub" id="final-sub"></div>
    </div>

    <div class="controls">
      <button class="btn btn-primary" onclick="checkAll()">Alle auswerten</button>
      <button class="btn btn-outline" onclick="resetAll()">Zurücksetzen</button>
      <button class="btn btn-secondary" onclick="showOnlyWrong()">Nur Falsche</button>
      <button class="btn btn-green" onclick="showAll()">Alle anzeigen</button>
    </div>

    <div class="filter-bar">
      <span style="font-size:0.8rem;color:#666;align-self:center">Filter:</span>
      <button class="filter-btn active" onclick="setFilter('all',this)">Alle</button>
      <button class="filter-btn" onclick="setFilter('open',this)">Offen</button>
      <button class="filter-btn" onclick="setFilter('correct',this)">Richtig</button>
      <button class="filter-btn" onclick="setFilter('wrong',this)">Falsch</button>
    </div>

    <div id="questions-container"></div>
  </div>
</div>

let currentFilter = 'all';
let questionStates = {};  // num -> 'open'|'correct'|'wrong'|'partial'

function loadTag(n) {
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  const btn = [...document.querySelectorAll('.tag-btn')].find(b => b.textContent.trim().startsWith('Tag ' + n));
  if (btn) btn.classList.add('active');
  document.getElementById('btn-all').classList.remove('active');

  const qs = quizData[n];
  if (!qs) return;
  loadQuestions(qs, 'Tag ' + n + ': ' + (tagTitles[n] || ''));
}

function loadAllTags() {
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-all').classList.add('active');
  const all = [];
  for (const n of Object.keys(quizData).sort((a,b)=>a-b)) {
    all.push(...quizData[n]);
  }
  loadQuestions(all, 'Alle Tage – Lernfeld 1');
}

function loadQuestions(qs, title) {
  questionStates = {};
  currentFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.filter-btn')[0].classList.add('active');

  document.getElementById('no-tag').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('quiz-title').textContent = title;
  document.getElementById('quiz-meta').textContent = qs.length + ' Fragen · Bei jeder Frage sind 1 oder 2 Antworten korrekt';
  document.getElementById('final-banner').classList.remove('show');

  qs.forEach(q => questionStates[q.num + '_' + q.text.slice(0,10)] = 'open');

  const container = document.getElementById('questions-container');
  container.innerHTML = '';

  qs.forEach((q, idx) => {
    const key = q.num + '_' + q.text.slice(0,10);
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card_' + key;

    card.innerHTML = `
      <div class="q-number">Frage ${idx + 1}</div>
      <div class="q-text">${q.text}</div>
      ${q.multi ? '<div class="q-hint">ℹ Mehrfachauswahl: 2 richtige Antworten</div>' : ''}
      <div class="choices" id="choices_${key}"></div>
      <button class="check-btn" id="checkbtn_${key}" disabled>Auswerten</button>
      <div class="q-feedback" id="feedback_${key}"></div>
    `;
    container.appendChild(card);

    // Add choice buttons via JS (avoids HTML attribute quoting issues)
    const choicesDiv = document.getElementById('choices_' + key);
    q.choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.id = 'choice_' + key + '_' + c.label;
      btn.dataset.label = c.label;
      btn.innerHTML = `<span class="label">${c.label}</span><span>${c.text}</span>`;
      btn.addEventListener('click', () => toggleChoice(key, c.label, q.multi));
      choicesDiv.appendChild(btn);
    });

    document.getElementById('checkbtn_' + key).addEventListener('click', () => checkQuestion(key, q.correct));
  });

  updateScoreboard();
}

function toggleChoice(key, label, multi) {
  const btn = document.getElementById('choice_' + key + '_' + label);
  if (!btn || btn.disabled) return;

  if (!multi) {
    document.querySelectorAll('[id^="choice_' + key + '_"]').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  } else {
    btn.classList.toggle('selected');
    const selected = document.querySelectorAll('[id^="choice_' + key + '_"].selected');
    if (selected.length > 2) btn.classList.remove('selected');
  }
  const anySelected = document.querySelectorAll('[id^="choice_' + key + '_"].selected').length > 0;
  document.getElementById('checkbtn_' + key).disabled = !anySelected;
}

function checkQuestion(key, correct) {
  const allChoiceBtns = document.querySelectorAll('[id^="choice_' + key + '_"]');
  const selected = [...allChoiceBtns].filter(b => b.classList.contains('selected')).map(b => b.dataset.label);

  allChoiceBtns.forEach(b => b.disabled = true);
  document.getElementById('checkbtn_' + key).disabled = true;

  const correctSet = new Set(correct);
  const selectedSet = new Set(selected);

  allChoiceBtns.forEach(b => {
    const lbl = b.dataset.label;
    if (correctSet.has(lbl) && selectedSet.has(lbl)) b.classList.add('correct-answer');
    else if (!correctSet.has(lbl) && selectedSet.has(lbl)) b.classList.add('wrong-selected');
    else if (correctSet.has(lbl) && !selectedSet.has(lbl)) b.classList.add('missed');
  });

  const allCorrectSelected = [...correctSet].every(l => selectedSet.has(l));
  const noWrongSelected = [...selectedSet].every(l => correctSet.has(l));
  let status = 'wrong';
  if (allCorrectSelected && noWrongSelected) status = 'correct';
  else if (!allCorrectSelected && noWrongSelected && selected.length > 0) status = 'partial';

  questionStates[key] = status;

  const feedback = document.getElementById('feedback_' + key);
  const card = document.getElementById('card_' + key);
  card.classList.remove('answered-correct','answered-wrong','answered-partial');

  if (status === 'correct') {
    feedback.className = 'q-feedback show ok';
    feedback.textContent = '✓ Richtig! Korrekte Antwort: ' + correct.join(', ');
    card.classList.add('answered-correct');
  } else if (status === 'partial') {
    feedback.className = 'q-feedback show partial';
    feedback.textContent = '◑ Teilweise richtig. Korrekte Antwort: ' + correct.join(', ');
    card.classList.add('answered-partial');
  } else {
    feedback.className = 'q-feedback show fail';
    feedback.textContent = '✗ Falsch. Korrekte Antwort: ' + correct.join(', ');
    card.classList.add('answered-wrong');
  }

  updateScoreboard();
  applyFilter(currentFilter);
}

function checkAll() {
  document.querySelectorAll('.check-btn:not(:disabled)').forEach(btn => btn.click());
}

function resetAll() {
  // Reload same tag
  const activeBtn = document.querySelector('.tag-btn.active');
  if (activeBtn) {
    const n = parseInt(activeBtn.textContent.trim().replace('Tag ',''));
    if (!isNaN(n)) { loadTag(n); return; }
  }
  if (document.getElementById('btn-all').classList.contains('active')) loadAllTags();
}

function updateScoreboard() {
  const vals = Object.values(questionStates);
  const total = vals.length;
  const correct = vals.filter(v => v === 'correct').length;
  const wrong = vals.filter(v => v === 'wrong' || v === 'partial').length;
  const open = vals.filter(v => v === 'open').length;
  const answered = correct + wrong;

  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent = wrong;
  document.getElementById('sc-open').textContent = open;

  if (answered > 0) {
    const pct = Math.round(correct / answered * 100);
    document.getElementById('sc-pct').textContent = pct + '%';
  } else {
    document.getElementById('sc-pct').textContent = '–';
  }

  const progress = total > 0 ? (answered / total * 100) : 0;
  document.getElementById('progress-fill').style.width = progress + '%';

  // Show final banner if all answered
  if (open === 0 && total > 0) {
    const pct = Math.round(correct / total * 100);
    let grade = '';
    if (pct >= 92) grade = '1';
    else if (pct >= 81) grade = '2';
    else if (pct >= 67) grade = '3';
    else if (pct >= 50) grade = '4';
    else if (pct >= 30) grade = '5';
    else grade = '6';
    document.getElementById('final-grade').textContent = pct + '% · Note ' + grade;
    document.getElementById('final-sub').textContent = correct + ' von ' + total + ' Fragen richtig';
    document.getElementById('final-banner').classList.add('show');
  }
}

function setFilter(filter, btnEl) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  applyFilter(filter);
}

function applyFilter(filter) {
  document.querySelectorAll('.question-card').forEach(card => {
    const key = card.id.replace('card_','');
    const state = questionStates[key] || 'open';
    if (filter === 'all') card.style.display = '';
    else if (filter === 'open') card.style.display = state === 'open' ? '' : 'none';
    else if (filter === 'correct') card.style.display = state === 'correct' ? '' : 'none';
    else if (filter === 'wrong') card.style.display = (state === 'wrong' || state === 'partial') ? '' : 'none';
  });
}

function showOnlyWrong() {
  const btn = [...document.querySelectorAll('.filter-btn')].find(b => b.textContent === 'Falsch');
  if (btn) setFilter('wrong', btn);
}

function showAll() {
  const btn = document.querySelectorAll('.filter-btn')[0];
  setFilter('all', btn);
}
</script>
